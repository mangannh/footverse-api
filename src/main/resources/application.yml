spring:
  application:
    name: FootVerse

  profiles:
    active: local



  datasource:
      url: ${FOOTVERSE_DB_URL}
      username: ${FOOTVERSE_DB_USERNAME}
      password: ${FOOTVERSE_DB_PASSWORD}
      driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Hibernate validates against the Flyway-managed schema; it never generates it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# Externalized JWT settings. Secrets are never hardcoded in source code; the value is
# supplied via the FOOTVERSE_JWT_SECRET environment variable (the default below is for
# local development only and must be overridden outside development).
footverse:
  jwt:
    secret: ${FOOTVERSE_JWT_SECRET}
    # Access-token time-to-live in seconds (15 minutes). Surfaced as AuthResponse.expiresIn.
    access-token-ttl-seconds: 900
    # Refresh-token time-to-live in seconds (30 days).
    refresh-token-ttl-seconds: 2592000
