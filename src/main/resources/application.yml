spring:
  application:
    name: FootVerse

  datasource:
    url: ${FOOTVERSE_DB_URL:jdbc:mysql://localhost:3306/footverse?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: ${FOOTVERSE_DB_USERNAME:root}
    password: ${FOOTVERSE_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Hibernate validates against the Flyway-managed schema; it never generates it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# Externalized JWT settings. Secrets are never hardcoded in source code; the value is
# supplied via the FOOTVERSE_JWT_SECRET environment variable (the default below is for
# local development only and must be overridden outside development).
footverse:
  jwt:
    secret: ${FOOTVERSE_JWT_SECRET:local-development-secret-change-me-please-32-bytes-minimum}
    # Access-token time-to-live in seconds (15 minutes). Surfaced as AuthResponse.expiresIn.
    access-token-ttl-seconds: 900
    # Refresh-token time-to-live in seconds (30 days).
    refresh-token-ttl-seconds: 2592000
